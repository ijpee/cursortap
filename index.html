<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cursortap</title>
</head>
<body>
  <div id="titlebar">
    <div class="traffic">
      <div class="dot close"></div>
      <div class="dot minimize"></div>
      <div class="dot zoom"></div>
    </div>
    <span class="name">cursortap<span class="caret">_</span></span>
    <span class="credit">TSE Onboarding</span>
  </div>
  <canvas id="c"></canvas>
  <div id="hint">
    <div class="hint-speakers">turn up the speakers</div>
    <div class="hint-tap">tap the screen…</div>
  </div>
  <div id="hint-keys" aria-hidden="true">
    <div class="hint-or">or press any key</div>
    <div class="hint-keyboard">
      <div class="kb-row">
        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>0</span>
      </div>
      <div class="kb-row">
        <span>Q</span><span>W</span><span>E</span><span>R</span><span>T</span><span>Y</span><span>U</span><span>I</span><span>O</span><span>P</span>
      </div>
      <div class="kb-row kb-row-a">
        <span>A</span><span>S</span><span>D</span><span>F</span><span>G</span><span>H</span><span>J</span><span>K</span><span>L</span>
      </div>
      <div class="kb-row kb-row-z">
        <span>Z</span><span>X</span><span>C</span><span>V</span><span>B</span><span>N</span><span>M</span>
      </div>
      <div class="kb-row kb-row-space">
        <span class="kb-space"></span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
